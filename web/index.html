<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="global_coolers">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>global_coolers</title>
  <link rel="manifest" href="manifest.json">
<style>
    body {
      background-color: #ffffff;
      margin: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
      height: 100dvh; /* Dynamic viewport height for mobile */
      width: 100vw;
    }
    #global-coolers-loader {
      text-align: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .icon-box {
      width: 120px;
      height: 120px;
      background-color: #ffffff;
      border-radius: 30px;
      box-shadow: 0 10px 25px rgba(76, 175, 80, 0.2);
      display: grid;
      place-items: center;
      margin: 0 auto 30px;
      animation: pulse 1.5s infinite ease-in-out alternate;
    }
    .icon {
      width: 70px;
      height: 70px;
      fill: #4CAF50;
    }
    h1 {
      margin: 0;
      color: #333333;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    h1 span {
      color: #4CAF50;
    }
    .spinner {
      margin: 30px auto 0;
      width: 36px;
      height: 36px;
      border: 3.5px solid rgba(76, 175, 80, 0.15);
      border-radius: 50%;
      border-top-color: #4CAF50;
      animation: spin 0.8s infinite linear;
    }
    @keyframes pulse {
      0% { transform: scale(0.96); opacity: 0.95; }
      100% { transform: scale(1.04); opacity: 1; }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="global-coolers-loader">
    <div class="icon-box">
      <!-- Clean Eco Leaf SVG -->
      <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M17,8C8,10 5.9,16.17 3.82,21.34L5.71,22L9.33,12.03C14,10.6 15,10.16 17,8ZM11,5H7V1L1,1V5H3V21.34C3.12,21.6 3.25,21.86 3.39,22.12C3.54,22.4 3.71,22.68 3.89,22.95C4.08,23.15 4.29,23.35 4.51,23.53C4.74,23.71 4.98,23.88 5.25,24H21V22H5.25C5.12,22 5,21.88 5,21.75V5H11V1H15V5H17V3H21V5H23V1H11V5Z"/>
      </svg>
    </div>
    <h1>Global <span>Coolers</span></h1>
    <div class="spinner"></div>
  </div>
  <!-- Standard Flutter script loading -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
